services:
  mfe1-react:
    build:
      context: ./mfe1-react
      dockerfile: Dockerfile
    container_name: mfe1-react
    ports:
      - "3001:3001"
    volumes:
      - ./mfe1-react:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true

  mfe2-angular:
    build:
      context: ./mfe2-angular
      dockerfile: Dockerfile
    container_name: mfe2-angular
    ports:
      - "3002:3002"
    volumes:
      - ./mfe2-angular:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=1

  host-nextjs:
    build:
      context: ./host-nextjs
      dockerfile: Dockerfile
    container_name: host-nextjs
    ports:
      - "3003:3003"
    volumes:
      - ./host-nextjs:/app
      - /app/node_modules
      - /app/.next
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - mfe1-react
      - mfe2-angular

  faststore:
    container_name: vtex-faststore-dev
    build:
      context: ./vtex.faststore
      dockerfile: Dockerfile
    image: vtex-faststore-dev:local
    restart: unless-stopped
    init: true
    working_dir: /workspace
    ports:
      - "3000:3000"
    env_file:
      - path: ./vtex.env
        required: false
      - path: ./.env
        required: false
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      YARN_CACHE_FOLDER: /usr/local/share/.cache/yarn
    volumes:
      - ./vtex.faststore:/workspace:delegated
      - node_modules_cache:/workspace/node_modules
      - yarn_cache:/usr/local/share/.cache/yarn

volumes:
  node_modules_cache:
  yarn_cache:
